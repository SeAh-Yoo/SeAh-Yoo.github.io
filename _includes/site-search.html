<section class="sidebar-search" data-site-search data-search-index="{{ '/search.json' | relative_url }}">
  <button class="sidebar-search-trigger" type="button" data-search-open aria-label="블로그 검색 열기" aria-haspopup="dialog" aria-keyshortcuts="Control+K Meta+K /">
    <span class="sidebar-search-icon" aria-hidden="true">⌕</span>
    <span class="sidebar-search-label">블로그 검색</span>
    <kbd class="sidebar-search-shortcut" aria-hidden="true">Ctrl K</kbd>
  </button>

  <dialog class="site-search-dialog" data-search-dialog aria-labelledby="site-search-title">
    <div class="site-search-panel">
      <header class="site-search-header">
        <div>
          <p class="site-search-kicker">ARCHIVE SEARCH</p>
          <h2 id="site-search-title">문하수도에서 찾기</h2>
        </div>
        <button class="site-search-close" type="button" data-search-close aria-label="검색 창 닫기">×</button>
      </header>

      <label class="site-search-input-wrap">
        <span class="site-search-input-icon" aria-hidden="true">⌕</span>
        <span class="visually-hidden">검색어</span>
        <input type="search" data-search-input autocomplete="off" spellcheck="false" placeholder="제목, 본문, 카테고리, 연재 검색" />
        <kbd aria-hidden="true">ESC</kbd>
      </label>

      <div class="site-search-meta">
        <p data-search-status role="status" aria-live="polite">검색어를 입력하세요.</p>
        <span>↑↓ 이동 · Enter 열기</span>
      </div>

      <ol class="site-search-results" data-search-results></ol>
      <p class="site-search-empty" data-search-empty hidden>일치하는 글을 찾지 못했습니다.</p>
    </div>
  </dialog>
</section>
