{% assign identity = site.data.site_identity %}
{% assign site_copy = identity.locales[identity.settings.default_language] %}
{% assign comments_copy = site_copy.post.comments %}
<section class="post-comments" aria-labelledby="post-comments-title">
  <header class="post-comments-header">
    <p class="post-comments-kicker">{{ comments_copy.kicker }}</p>
    <h2 id="post-comments-title">{{ comments_copy.title }}</h2>
    <p>{{ comments_copy.description }}</p>
  </header>

  <div class="giscus"
       data-giscus-container
       data-repo="SeAh-Yoo/SeAh-Yoo.github.io"
       data-repo-id="R_kgDOTBXxUQ"
       data-category="Announcements"
       data-category-id="DIC_kwDOTBXxUc4C_vht"
       data-mapping="pathname"
       data-strict="1"
       data-reactions-enabled="1"
       data-emit-metadata="0"
       data-input-position="top"
       data-theme="https://cdn.jsdelivr.net/gh/SeAh-Yoo/SeAh-Yoo.github.io@main/styles/giscus-sewer-center.css"
       data-lang="{{ identity.settings.default_language }}"
       data-loading="lazy"></div>
</section>
