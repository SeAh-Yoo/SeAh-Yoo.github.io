<aside class="sidebar glass-panel" aria-label="칼럼 목록">
  <a class="brand" href="{{ '/' | relative_url }}">
    <span class="brand-mark">S</span>
    <span><strong>{{ site.english_title }}</strong><small>문하수도</small></span>
  </a>
  <nav>
    <p class="eyebrow">Archive</p>
    <ol class="archive-list">
      {% for post in site.posts reversed %}
      <li>
        <a href="{{ post.url | relative_url }}"{% if page.url == post.url %} class="active" aria-current="page"{% endif %}>
          {{ post.title }}
          <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y년 %-m월 %-d일" }}</time>
        </a>
      </li>
      {% endfor %}
    </ol>
  </nav>
</aside>
