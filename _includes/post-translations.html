<nav class="post-translations" aria-label="이 글의 번역">
  <span class="post-translations-label">Translate</span>
  {% if page.translation_en %}
  <a class="post-translation-button is-available" href="{{ page.translation_en | escape }}" hreflang="en" lang="en">English</a>
  {% else %}
  <span class="post-translation-button is-unavailable" aria-disabled="true" title="영어 번역 준비 중" lang="en">English</span>
  {% endif %}
  {% if page.translation_ja %}
  <a class="post-translation-button is-available" href="{{ page.translation_ja | escape }}" hreflang="ja" lang="ja">日本語</a>
  {% else %}
  <span class="post-translation-button is-unavailable" aria-disabled="true" title="일본어 번역 준비 중" lang="ja">日本語</span>
  {% endif %}
</nav>
