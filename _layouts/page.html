<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    {% include head.html %}
  </head>
  <body>
    <a class="skip-link" href="#main-content">본문으로 바로가기</a>
    <div class="aurora aurora-one" aria-hidden="true"></div>
    <div class="aurora aurora-two" aria-hidden="true"></div>
    <div class="shell">
      {% include sidebar.html %}

      <main class="content" id="main-content">
        <header class="hero page-hero glass-panel">
          <p class="eyebrow">{{ page.eyebrow | default: "The Literary Underground" }}</p>
          <h1>{{ page.title }}</h1>
          {% if page.intro %}<p>{{ page.intro }}</p>{% endif %}
        </header>

        {{ content }}
      </main>
    </div>
    {% include analytics-tracking.html %}
    <script src="{{ '/scripts/index.js' | relative_url }}"></script>
  </body>
</html>
