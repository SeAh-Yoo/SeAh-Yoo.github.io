settings:
  default_language: "ko"
  preference_storage_key: "literary-underground:preferences:v1"
  supported_languages:
    - "ko"
    - "en"
    - "ja"

# Used by every layout and include for internal and external destinations.
links:
  home: "/"
  feed: "/feed.xml"
  search_index: "/search.json"
  license: "https://creativecommons.org/publicdomain/zero/1.0/deed.ko"
  analytics_privacy: "https://www.goatcounter.com/help/privacy"
  analytics_opt_out: "#toggle-goatcounter"

# Used by _includes/head.html, _includes/sidebar.html, and post quote cards.
assets:
  favicon_image: "/assets/images/favicon.png"
  apple_touch_icon: "/assets/images/apple-touch-icon.png"
  profile_image: "/assets/images/profile.jpg"
  default_social_image: "/assets/images/default-social.jpg"

# All visible Korean interface copy lives below this key. Phase two adds en and ja siblings.
locales:
  ko:
    meta:
      html_lang: "ko-KR"
      og_locale: "ko_KR"
      number_locale: "ko-KR"
      date_short: "%Y년 %-m월 %-d일"
      date_month_day: "%m월 %-d일"
      date_long: "%Y년 %-m월 %-d일 %H:%M"

