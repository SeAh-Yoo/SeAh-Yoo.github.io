operator:
  name: "유세아"
  alternate_name: "SeAh Yoo"
  role: "공간 관리인"
  site_description: "개인이 관리하는 이상 기록 공간"
  editorial_purpose: "게임·서브컬처·영화·인터넷·AI와 사회에서 발견한 질문을 수집하고, 생각이 이어지는 순서대로 기록합니다."
  editorial_method: "사실과 해석을 구분하고, 필요한 경우 원문·기사·연구·게임과 작품을 근거 자료로 남깁니다. 각 게시물은 확정된 판정보다 계속 검토하고 갱신할 수 있는 비평의 출발점으로 취급합니다."
  preservation_note: "쓸데없이 오래 생각한 것과 잊히기 아까운 문화의 잔여물을 남몰래 보존합니다."
  introduction: "2000년 10월 10일생, 천칭자리, 키 170.8cm, 체중은 비밀."
  reader_notice: "모든 기록은 작성자의 기억과 취향에 따라 임의로 연결됩니다. 길을 잃었다면 중심 합류점으로 돌아가십시오."
  editor_note: "기억에 없는 문장이 발견되면 날짜와 위치를 적어 둡니다. 대개는 나중에 이유를 알게 됩니다."

