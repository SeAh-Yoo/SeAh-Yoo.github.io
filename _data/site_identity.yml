settings:
  default_language: "ko"
  preference_storage_key: "literary-underground:preferences:v1"
  supported_languages:
    - id: "ko"
      flag: "🇰🇷"
      icon: "/assets/images/language-ko.svg"
    - id: "en"
      flag: "🇺🇸"
      icon: "/assets/images/language-en.svg"
    - id: "ja"
      flag: "🇯🇵"
      icon: "/assets/images/language-ja.svg"

# Used by every layout and include for internal and external destinations.
links:
  home: "/"
  feed: "/feed.xml"
  search_index: "/search.json"
  license: "https://creativecommons.org/publicdomain/zero/1.0/deed.ko"
  analytics_privacy: "https://www.goatcounter.com/help/privacy"
  analytics_opt_out: "#toggle-goatcounter"

# Used by _includes/sidebar.html as the visible brand emblem.
assets:
  brand_emblem: "/assets/images/manhole-dive-favicon.svg"
  # Used by _includes/head.html as the scalable browser-tab icon.
  favicon_svg_image: "/assets/images/manhole-dive-favicon.svg"
  # Used by _includes/head.html for standard browser-tab icons.
  favicon_image: "/assets/images/manhole-dive-favicon-32.png"
  # Used by _includes/head.html for high-density browser and device icons.
  favicon_large_image: "/assets/images/manhole-dive-icon-192.png"
  # Used by _includes/head.html for iOS home-screen bookmarks.
  apple_touch_icon: "/assets/images/manhole-dive-apple-touch-180.png"
  # Used by _includes/head.html and post quote cards as fallback imagery.
  profile_image: "/assets/images/profile.jpg"
  # Used by _includes/head.html as the default social preview image.
  default_social_image: "/assets/images/default-social.jpg"

# All visible interface copy lives below this key, grouped by language.
locales:
  ko:
    meta:
      html_lang: "ko-KR"
      og_locale: "ko_KR"
      number_locale: "ko-KR"
      date_short: "%Y년 %-m월 %-d일"
      date_month_day: "%m월 %-d일"
      date_long: "%Y년 %-m월 %-d일 %H:%M"

    # Used by the sidebar language selector and post translation navigation.
    languages:
      ko: "한국어"
      en: "English"
      ja: "日本語"

