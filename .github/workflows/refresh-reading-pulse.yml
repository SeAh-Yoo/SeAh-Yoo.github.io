name: Refresh reading pulse

on:
  schedule:
    # 12:17 Asia/Seoul (03:17 UTC), after the public counters have settled.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-reading-pulse
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the publishing branch
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh the public counter snapshot
        run: node scripts/refresh-reading-pulse.mjs

      - name: Commit a changed snapshot
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- _data/reading_pulse.json)" ]]; then
            echo "Reading-pulse snapshot has not changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/reading_pulse.json
          git commit -m "chore: refresh reading pulse"
          git push
