<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Person intentionally diving into a manhole</title>
  <desc id="desc">A warm-ivory stick figure deliberately dives into an underground manhole portal on a deep-petrol rounded-square background.</desc>

  <rect width="64" height="64" rx="13" fill="#25646A"/>

  <!-- One simplified front lip gives the opening cylindrical underground depth. -->
  <path d="M24 46.6
           C25.8 52.0 55.2 52.0 57 46.6
           L57 50.9
           C54.6 56.5 26.4 56.5 24 50.9
           Z"
        fill="#F4F1E9"/>

  <!-- Deliberate head-first diving pose. -->
  <g fill="none" stroke="#F4F1E9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M25.8 24.2 L33.1 31.0"/>
    <path d="M25.8 24.2 L16.2 11.4"/>
    <path d="M25.8 24.2 L11.5 24.4"/>
    <path d="M31.6 29.5 L22.8 35.0"/>
    <path d="M32.4 30.2 L41.0 38.1 L43.4 46.5"/>
  </g>

  <!-- Slightly enlarged head for 16×16 optical clarity. -->
  <circle cx="37.2" cy="34.2" r="4.6" fill="#F4F1E9"/>

  <!-- Bold manhole rim with one large negative-space inner opening. -->
  <path fill="#F4F1E9" fill-rule="evenodd"
        d="M40.5 40.2
           C50.1 40.2 57.5 43.1 57.5 47.0
           C57.5 50.9 50.1 53.8 40.5 53.8
           C30.9 53.8 23.5 50.9 23.5 47.0
           C23.5 43.1 30.9 40.2 40.5 40.2
           Z
           M40.5 44.1
           C46.7 44.1 51.6 45.3 51.6 47.0
           C51.6 48.7 46.7 49.9 40.5 49.9
           C34.3 49.9 29.4 48.7 29.4 47.0
           C29.4 45.3 34.3 44.1 40.5 44.1
           Z"/>
</svg>
