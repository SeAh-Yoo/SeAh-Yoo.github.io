<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Person diving into a manhole</title>
  <desc id="desc">A warm-ivory pictogram deliberately dives head-first into an underground manhole on a deep-petrol rounded square.</desc>
  <rect width="64" height="64" rx="13" fill="#25646A"/>

  <!-- Compact cylindrical manhole: front wall and bold top rim. -->
  <path d="M13 43.5c0-4.4 8.5-7.7 19-7.7s19 3.3 19 7.7v6.1c0 4.5-8.5 8-19 8s-19-3.5-19-8z" fill="#F4F1E9"/>
  <path d="M18.6 43.5c0-2.2 6-4.2 13.4-4.2s13.4 2 13.4 4.2-6 4.2-13.4 4.2-13.4-2-13.4-4.2z" fill="#25646A"/>

  <!-- Deliberate head-first dive. Thick rounded strokes preserve the pose at 16px. -->
  <g fill="none" stroke="#F4F1E9" stroke-width="5.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M29.5 24.5 36 31.2 39.2 39.5"/>
    <path d="M29.5 24.5 20.6 17.1 18.2 9.4"/>
    <path d="M29.5 24.5 20.4 30.1 11.8 24.2"/>
    <path d="M34.9 30.3 29.7 37.1 31.2 47"/>
  </g>
  <circle cx="40.7" cy="34.2" r="4.8" fill="#F4F1E9"/>
</svg>
